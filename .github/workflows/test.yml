name: Test

on:
  workflow_call:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      test: ${{ steps.default.outputs.test || steps.filter.outputs.test || 'false' }}
    steps:
      - name: Enable tests for reusable workflow calls
        id: default
        if: github.event_name == 'workflow_call'
        run: echo "test=true" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: github.event_name != 'workflow_call'
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect files changed from main
        id: filter
        if: github.event_name != 'workflow_call'
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          base: main
          filters: |
            test:
              - 'Tabora/**'
              - 'Tabora.xcodeproj/**'
              - 'TaboraTests/**'
              - 'TaboraUITests/**'
              - 'mise.toml'
              - 'lefthook.yml'
              - '.swiftformat'
              - '.swiftlint.yml'
              - '.github/workflows/test.yml'

  lint:
    name: Lint
    needs: changes
    if: needs.changes.outputs.test == 'true'
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4.0.0
        with:
          version: 2026.3.9
          cache: true

      - name: SwiftFormat check
        run: mise exec -- swiftformat --lint .

      - name: SwiftLint check
        run: mise exec -- swiftlint lint --quiet

  unit-test:
    name: Unit Tests
    needs: changes
    if: needs.changes.outputs.test == 'true'
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run unit tests
        run: |
          xcodebuild -project Tabora.xcodeproj \
            -scheme Tabora \
            -destination 'platform=macOS' \
            -only-testing:TaboraTests \
            test

  ui-test:
    name: UI Tests
    needs: changes
    if: needs.changes.outputs.test == 'true'
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run UI tests
        run: |
          xcodebuild -project Tabora.xcodeproj \
            -scheme Tabora \
            -destination 'platform=macOS' \
            -only-testing:TaboraUITests \
            test

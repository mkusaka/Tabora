name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: Version string used for validation builds
        required: false
        default: "0.0.0"
        type: string

permissions: {}

jobs:
  test:
    name: Test
    uses: ./.github/workflows/test.yml
    permissions:
      contents: read

  release:
    name: Build & Release
    needs: test
    runs-on: macos-15
    timeout-minutes: 90
    permissions:
      contents: write
    env:
      APP_NAME: Tabora
      RELEASE_ZIP_NAME: Tabora.zip
      CASK_NAME: tabora
      HOMEBREW_REPO: mkusaka/homebrew-tap
      APPLE_DEVELOPER_ID_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
      APPLE_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
      APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
      APPLE_APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APPLE_APP_STORE_CONNECT_API_KEY_BASE64 }}
      APPLE_APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APPLE_APP_STORE_CONNECT_ISSUER_ID }}
      APPLE_APP_STORE_CONNECT_KEY_ID: ${{ secrets.APPLE_APP_STORE_CONNECT_KEY_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set version
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            VERSION="$DISPATCH_VERSION"
          else
            VERSION=${GITHUB_REF_NAME#v}
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+(\.[0-9]+){0,2}$ ]]; then
            echo "::error::VERSION must use digits and dots only (for example: 1.2.3)"
            exit 1
          fi

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Validate signing secrets
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          required_secrets=(
            APPLE_DEVELOPER_ID_P12_BASE64
            APPLE_DEVELOPER_ID_P12_PASSWORD
            APPLE_KEYCHAIN_PASSWORD
            APPLE_APP_STORE_CONNECT_API_KEY_BASE64
            APPLE_APP_STORE_CONNECT_ISSUER_ID
            APPLE_APP_STORE_CONNECT_KEY_ID
            APPLE_TEAM_ID
          )

          if [[ "$GITHUB_EVENT_NAME" != "workflow_dispatch" ]]; then
            required_secrets+=(HOMEBREW_TAP_TOKEN)
          fi

          for secret_name in "${required_secrets[@]}"; do
            if [[ -z "${!secret_name:-}" ]]; then
              echo "::error::Missing required secret: $secret_name"
              exit 1
            fi
          done

      - name: Install signing assets
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/tabora-signing.keychain-db"
          DEVELOPER_ID_P12_PATH="$RUNNER_TEMP/developer-id-application.p12"
          APP_STORE_CONNECT_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_APP_STORE_CONNECT_KEY_ID}.p8"

          echo "$APPLE_DEVELOPER_ID_P12_BASE64" | base64 --decode > "$DEVELOPER_ID_P12_PATH"
          echo "$APPLE_APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode > "$APP_STORE_CONNECT_KEY_PATH"
          security create-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$APPLE_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$DEVELOPER_ID_P12_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_DEVELOPER_ID_P12_PASSWORD" \
            -f pkcs12 \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productbuild
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$APPLE_KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          {
            echo "KEYCHAIN_PATH=$KEYCHAIN_PATH"
            echo "DEVELOPER_ID_P12_PATH=$DEVELOPER_ID_P12_PATH"
            echo "APP_STORE_CONNECT_KEY_PATH=$APP_STORE_CONNECT_KEY_PATH"
          } >> "$GITHUB_ENV"

      - name: Archive
        run: |
          xcodebuild archive \
            -project Tabora.xcodeproj \
            -scheme Tabora \
            -archivePath build/Tabora.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            ENABLE_HARDENED_RUNTIME=YES \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            MARKETING_VERSION="$VERSION"

      - name: Export signed app
        run: |
          cat > build/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "https://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Developer ID Application</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath build/Tabora.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist build/ExportOptions.plist

      - name: Verify signed app
        run: |
          codesign --verify --deep --strict --verbose=2 "build/export/${APP_NAME}.app"

      - name: Notarize app
        run: |
          ditto -c -k --keepParent "build/export/${APP_NAME}.app" "build/${APP_NAME}.notarization.zip"

          xcrun notarytool submit "build/${APP_NAME}.notarization.zip" \
            --key "$APP_STORE_CONNECT_KEY_PATH" \
            --key-id "$APPLE_APP_STORE_CONNECT_KEY_ID" \
            --issuer "$APPLE_APP_STORE_CONNECT_ISSUER_ID" \
            --timeout 1h \
            --wait

      - name: Staple notarization ticket
        run: |
          xcrun stapler staple -v "build/export/${APP_NAME}.app"
          xcrun stapler validate -v "build/export/${APP_NAME}.app"
          spctl --assess --type execute --verbose=4 "build/export/${APP_NAME}.app"

      - name: Create release ZIP
        run: |
          ditto -c -k --keepParent "build/export/${APP_NAME}.app" "$RELEASE_ZIP_NAME"

      - name: Compute SHA256
        run: |
          SHA256=$(shasum -a 256 "$RELEASE_ZIP_NAME" | awk '{print $1}')
          echo "SHA256=$SHA256" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        if: github.event_name != 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "$RELEASE_ZIP_NAME" \
            --title "Tabora $GITHUB_REF_NAME" \
            --generate-notes

      - name: Update Homebrew tap
        if: github.event_name != 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          gh api "repos/${HOMEBREW_REPO}/dispatches" \
            -f event_type=update-cask \
            -f "client_payload[cask]=$CASK_NAME" \
            -f "client_payload[version]=$VERSION" \
            -f "client_payload[sha256]=$SHA256"

      - name: Cleanup signing assets
        if: always()
        run: |
          rm -f "$RUNNER_TEMP"/developer-id-application.p12
          rm -f "$RUNNER_TEMP"/AuthKey_*.p8
          if [[ -n "${KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
